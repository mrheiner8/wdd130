<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Along Quiz form</title>
    <link rel="stylesheet" href="styles/quiz.css">
    <meta name="description" content="Placeholder">
    <meta name="author" content="Michael Ray Heiner">
</head>

<body>
    <header>
        <h1>Basic HTML And CSS Quiz </h1>
    </header>
    <main>
        <form>
            <div class="quiz-item">
                <label for="q1">1. Which HTML tag is used to define the largest and most important heading on a page?</label>
                <input type="text" id="q1" name="q1">
            </div>
            <div class="quiz-item">
                <label for="q2">2. Explain the difference between a CSS 'ID' selector and a 'Class' selector in your own words.</label>
                <textarea id="q2" name="q2"
                    placeholder="..."></textarea>
            </div>
            <div class="quiz-item">
                <label for="q3">3. Which CSS property is used to change the text color of an element?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose One</option>
                    <option value="a">A. color</option>
                    <option value="b">B. text-style</option>
                    <option value="c">C. font-color</option>
                </select>
            </div>
            <div class="quiz-item">
                <label for="q4">4. How many pixels are in 1 standard 'em' unit if the browser default font size is 16px?</label>
                <input type="number" id="q4" name="q4">
            </div>
            <div class="quiz-item">
                <button type="submit">Submit Quiz</button>
            </div>
        </form>
    </main>
    <footer>
        <p>🎷Michael Heiner</p>
    </footer>
</body>

</html>
